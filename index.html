<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Logístico FRUVER</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {font-family: Arial; margin: 40px; background:#f5f6fa;}
    h1 {text-align:center;}
    .grid {display:grid; grid-template-columns: 1fr 1fr; gap:40px;}
    canvas {background:white; padding:20px; border-radius:10px;}
    table {border-collapse: collapse; width:100%; background:white;}
    th, td {border:1px solid #ddd; padding:8px;}
    th {background:#2f3640; color:white;}
  </style>
</head>

<body>

<h1>📦 Dashboard Logístico FRUVER</h1>

<div class="grid">
  <canvas id="saldoChart"></canvas>
  <canvas id="cumplimientoChart"></canvas>
</div>

<h2>🏆 Ranking crítico tiendas</h2>
<table id="tablaRanking">
<thead>
<tr>
<th>Tienda</th>
<th>Saldo</th>
<th>% Cumplimiento</th>
<th>Aging</th>
<th>Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKDt3OhqiTwY3aJ-TYfP1-HcXCb6EPSn4xJHl02UqapMUGXZKWQU0fXpzB22E_nA/pub?gid=1273729648&single=true&output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

  const rows = data.trim().split("\n").slice(1);

  let tiendas=[], saldo=[], cumplimiento=[], aging=[], score=[];
  let ranking=[];

  rows.forEach(r => {

    const c = r.split(",");

    const tienda=c[0];
    const sal=Number(c[3]);
    const cump=Number(c[4])*100;
    const age=Number(c[5]);
    const sco=Number(c[6])*100;

    tiendas.push(tienda);
    saldo.push(sal);
    cumplimiento.push(cump);
    aging.push(age);
    score.push(sco);

    ranking.push({tienda, sal, cump, age, sco});

  });

  // ordenar ranking crítico
  ranking.sort((a,b)=>b.sal-a.sal);

  const tbody=document.querySelector("#tablaRanking tbody");

  ranking.slice(0,15).forEach(r=>{
    tbody.innerHTML+=`
      <tr>
        <td>${r.tienda}</td>
        <td>${r.sal}</td>
        <td>${r.cump.toFixed(1)}%</td>
        <td>${r.age.toFixed(1)}</td>
        <td>${r.sco.toFixed(1)}</td>
      </tr>`;
  });

  // gráfico saldo
  new Chart(document.getElementById("saldoChart"), {
    type:'bar',
    data:{labels:tiendas, datasets:[{label:'Saldo por tienda', data:saldo}]}
  });

  // gráfico cumplimiento
  new Chart(document.getElementById("cumplimientoChart"), {
    type:'bar',
    data:{labels:tiendas, datasets:[{label:'% Cumplimiento', data:cumplimiento}]}
  });

});

</script>

</body>
</html>
